<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ subject }}</title>
  <style>
    /* Reset */
    body, table, td, a { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
    table, td { mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
    img { -ms-interpolation-mode: bicubic; border: 0; height: auto; line-height: 100%; outline: none; text-decoration: none; }
    body { margin: 0; padding: 0; width: 100% !important; height: 100% !important; background-color: #f3f4f6; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }

    /* Layout */
    .email-wrapper { max-width: 600px; margin: 0 auto; padding: 24px 16px; }
    .email-card { background-color: #ffffff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }

    /* Header */
    .header { background: linear-gradient(135deg, #1e3a8a 0%, #1a56db 50%, #3b82f6 100%); padding: 32px 40px; text-align: center; }
    .header .logo { font-size: 24px; font-weight: 700; color: #ffffff; margin: 0 0 4px 0; letter-spacing: -0.3px; }
    .header .subtext { font-size: 13px; color: rgba(255,255,255,0.85); margin: 0; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; }

    /* Body */
    .email-body { padding: 36px 40px; }
    .email-body h1 { font-size: 22px; font-weight: 700; color: #111827; margin: 0 0 8px 0; line-height: 1.3; }
    .email-body h2 { font-size: 18px; font-weight: 600; color: #111827; margin: 24px 0 8px 0; line-height: 1.3; }
    .email-body p { font-size: 15px; color: #374151; line-height: 1.6; margin: 0 0 16px 0; }
    .email-body .greeting { font-size: 15px; color: #374151; margin: 0 0 20px 0; }

    /* OTP Code Box */
    .otp-box { background-color: #f0f5ff; border: 2px dashed #1a56db; border-radius: 12px; padding: 20px 24px; text-align: center; margin: 24px 0; }
    .otp-label { font-size: 13px; font-weight: 500; color: #6b7280; text-transform: uppercase; letter-spacing: 0.5px; margin: 0 0 8px 0; }
    .otp-code { font-size: 36px; font-weight: 800; color: #1a56db; letter-spacing: 8px; margin: 0; font-family: 'Courier New', Courier, monospace; }

    /* CTA Button */
    .cta-button { display: inline-block; padding: 14px 32px; background: linear-gradient(135deg, #1a56db 0%, #3b82f6 100%); color: #ffffff !important; text-decoration: none; font-size: 15px; font-weight: 600; border-radius: 8px; margin: 24px 0; text-align: center; }
    .cta-button:hover { background: linear-gradient(135deg, #1e40af 0%, #2563eb 100%); }

    /* Info Box */
    .info-box { background-color: #f9fafb; border-left: 4px solid #1a56db; border-radius: 0 8px 8px 0; padding: 16px 20px; margin: 20px 0; }
    .info-box p { margin: 0; font-size: 14px; color: #374151; }
    .info-box .label { font-weight: 600; color: #111827; }

    /* Detail Rows */
    .detail-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f3f4f6; font-size: 14px; }
    .detail-row .label { color: #6b7280; }
    .detail-row .value { color: #111827; font-weight: 600; }
    .detail-card { background-color: #f9fafb; border-radius: 8px; padding: 16px 20px; margin: 16px 0; border: 1px solid #e5e7eb; }

    /* Divider */
    .divider { border: none; border-top: 1px solid #e5e7eb; margin: 24px 0; }

    /* Warning Box */
    .warning-box { background-color: #fffbeb; border-left: 4px solid #d97706; border-radius: 0 8px 8px 0; padding: 14px 20px; margin: 20px 0; }
    .warning-box p { margin: 0; font-size: 14px; color: #92400e; }

    /* Success Box */
    .success-box { background-color: #ecfdf5; border-left: 4px solid #059669; border-radius: 0 8px 8px 0; padding: 14px 20px; margin: 20px 0; }
    .success-box p { margin: 0; font-size: 14px; color: #065f46; }

    /* Footer */
    .email-footer { background-color: #f9fafb; padding: 24px 40px; text-align: center; border-top: 1px solid #e5e7eb; }
    .footer-brand { font-size: 14px; font-weight: 600; color: #1a56db; margin: 0 0 4px 0; }
    .footer-text { font-size: 12px; color: #9ca3af; margin: 0 0 4px 0; line-height: 1.5; }
    .footer-links { font-size: 12px; color: #9ca3af; margin: 8px 0 0 0; }
    .footer-links a { color: #1a56db; text-decoration: none; }

    /* Responsive */
    @media only screen and (max-width: 620px) {
      .email-wrapper { padding: 12px 8px; }
      .header { padding: 24px 20px; }
      .email-body { padding: 24px 20px; }
      .email-footer { padding: 20px; }
      .otp-code { font-size: 28px; letter-spacing: 6px; }
    }
  </style>
</head>
<body>
  <div class="email-wrapper">
    <div class="email-card">

      <!-- Header -->
      <div class="header">
        <div class="logo">CrestPoint Credit</div>
        <div class="subtext">Digital Banking</div>
      </div>

      <!-- Body -->
      <div class="email-body">
        {% block content %}{% endblock %}
      </div>

      <!-- Footer -->
      <div class="email-footer">
        <div class="footer-brand">CrestPoint Credit</div>
        <div class="footer-text">
          This is an automated message from CrestPoint Credit.<br>
          If you did not initiate this action, please contact our support team immediately.
        </div>
        <div class="footer-links">
          <a href="https://www.crestpointcredit.online">crestpointcredit.online</a>
        </div>
      </div>

    </div>
  </div>
</body>
</html>
